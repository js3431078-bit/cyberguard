<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="1200" fill="#f0f4f8"/>

  <!-- Title -->
  <rect x="50" y="20" width="800" height="52" rx="10" fill="#1b3a57"/>
  <text x="450" y="52" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffd166">CyberGuard — BERT Crime Detection Architecture</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 1: Data Source -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="330" y="100" width="240" height="70" rx="12" fill="#1b3a57" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffd166">📂 dataset.csv</text>
  <text x="450" y="148" text-anchor="middle" font-size="11" fill="#94a3b8">Cybercrime Labeled Dataset</text>
  <text x="450" y="163" text-anchor="middle" font-size="10" fill="#60a5fa">columns: text, category</text>

  <!-- Arrow down -->
  <line x1="450" y1="170" x2="450" y2="205" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 2: Data Collection -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="330" y="205" width="240" height="70" rx="12" fill="#0f2027" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="233" text-anchor="middle" font-size="13" font-weight="bold" fill="#22c55e">🔄 Data Collection</text>
  <text x="450" y="251" text-anchor="middle" font-size="10" fill="#94a3b8">Load CSV · Validate columns</text>
  <text x="450" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">Remove duplicates · UTF-8 check</text>

  <!-- Arrow down -->
  <line x1="450" y1="275" x2="450" y2="310" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 3: Preprocessing -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="330" y="310" width="240" height="80" rx="12" fill="#0f2027" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="338" text-anchor="middle" font-size="13" font-weight="bold" fill="#f97316">⚙️ Preprocessing</text>
  <text x="450" y="356" text-anchor="middle" font-size="10" fill="#94a3b8">Lowercase · Strip HTML/URLs</text>
  <text x="450" y="371" text-anchor="middle" font-size="10" fill="#94a3b8">Label Encoding → labels.json</text>
  <text x="450" y="386" text-anchor="middle" font-size="10" fill="#94a3b8">Split: 70% train / 15% val / 15% test</text>

  <!-- Arrow splits into two -->
  <line x1="450" y1="390" x2="450" y2="415" stroke="#2563eb" stroke-width="2"/>
  <line x1="450" y1="415" x2="250" y2="415" stroke="#2563eb" stroke-width="2"/>
  <line x1="450" y1="415" x2="650" y2="415" stroke="#2563eb" stroke-width="2"/>
  <line x1="250" y1="415" x2="250" y2="445" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="650" y1="415" x2="650" y2="445" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 4: Split + Tokenizing (side by side) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="130" y="445" width="240" height="75" rx="12" fill="#0f2027" stroke="#a78bfa" stroke-width="2"/>
  <text x="250" y="472" text-anchor="middle" font-size="13" font-weight="bold" fill="#a78bfa">📊 Split the Data</text>
  <text x="250" y="490" text-anchor="middle" font-size="10" fill="#94a3b8">Train set · Val set · Test set</text>
  <text x="250" y="505" text-anchor="middle" font-size="10" fill="#94a3b8">Fixed random seed (reproducible)</text>

  <rect x="530" y="445" width="240" height="75" rx="12" fill="#0f2027" stroke="#e63946" stroke-width="2"/>
  <text x="650" y="472" text-anchor="middle" font-size="13" font-weight="bold" fill="#e63946">🔤 Tokenizing</text>
  <text x="650" y="490" text-anchor="middle" font-size="10" fill="#94a3b8">bert-base-uncased · max_len=128</text>
  <text x="650" y="505" text-anchor="middle" font-size="10" fill="#94a3b8">input_ids · attention_mask</text>

  <!-- Arrows converge -->
  <line x1="250" y1="520" x2="250" y2="548" stroke="#2563eb" stroke-width="2"/>
  <line x1="650" y1="520" x2="650" y2="548" stroke="#2563eb" stroke-width="2"/>
  <line x1="250" y1="548" x2="450" y2="548" stroke="#2563eb" stroke-width="2"/>
  <line x1="650" y1="548" x2="450" y2="548" stroke="#2563eb" stroke-width="2"/>
  <line x1="450" y1="548" x2="450" y2="575" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 5: BERT Model -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="280" y="575" width="340" height="80" rx="12" fill="#1b3a57" stroke="#ffd166" stroke-width="2.5"/>
  <text x="450" y="603" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffd166">🧠 BERT Model</text>
  <text x="450" y="622" text-anchor="middle" font-size="11" fill="#cbd5e1">bert-base-uncased + Classification Head</text>
  <text x="450" y="640" text-anchor="middle" font-size="10" fill="#94a3b8">AdamW · lr=2e-5 · 3 epochs · GPU/CPU auto</text>

  <!-- Arrow down -->
  <line x1="450" y1="655" x2="450" y2="685" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 6: Training box (dashed) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="80" y="685" width="740" height="110" rx="12" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="450" y="705" text-anchor="middle" font-size="10" fill="#64748b">train_pipeline.py</text>

  <!-- Input -->
  <rect x="110" y="715" width="160" height="60" rx="10" fill="#0f2027" stroke="#22c55e" stroke-width="1.5"/>
  <text x="190" y="742" text-anchor="middle" font-size="12" font-weight="bold" fill="#22c55e">📥 Input</text>
  <text x="190" y="758" text-anchor="middle" font-size="10" fill="#94a3b8">Tokenized tensors</text>
  <text x="190" y="772" text-anchor="middle" font-size="10" fill="#94a3b8">Batched DataLoader</text>

  <line x1="270" y1="745" x2="310" y2="745" stroke="#ffd166" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Training -->
  <rect x="310" y="715" width="180" height="60" rx="10" fill="#0f2027" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="742" text-anchor="middle" font-size="12" font-weight="bold" fill="#f97316">⚙️ Training</text>
  <text x="400" y="758" text-anchor="middle" font-size="10" fill="#94a3b8">Fine-tune · Loss · Val Acc</text>
  <text x="400" y="772" text-anchor="middle" font-size="10" fill="#94a3b8">Save best checkpoint</text>

  <line x1="490" y1="745" x2="530" y2="745" stroke="#ffd166" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="530" y="715" width="260" height="60" rx="10" fill="#0f2027" stroke="#e63946" stroke-width="1.5"/>
  <text x="660" y="742" text-anchor="middle" font-size="12" font-weight="bold" fill="#e63946">📤 Output</text>
  <text x="660" y="758" text-anchor="middle" font-size="10" fill="#94a3b8">model/ · labels.json · metadata.json</text>
  <text x="660" y="772" text-anchor="middle" font-size="10" fill="#94a3b8">Test Acc · F1 per class</text>

  <!-- Arrow down from training box -->
  <line x1="450" y1="795" x2="450" y2="830" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 7: Visualization + Inference (side by side) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="80" y="830" width="340" height="90" rx="12" fill="#0f2027" stroke="#60a5fa" stroke-width="2"/>
  <text x="250" y="858" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa">📊 Visualization</text>
  <text x="250" y="876" text-anchor="middle" font-size="10" fill="#94a3b8">Loss curve · Val accuracy curve</text>
  <text x="250" y="891" text-anchor="middle" font-size="10" fill="#94a3b8">Confusion matrix · Label distribution</text>
  <text x="250" y="906" text-anchor="middle" font-size="10" fill="#60a5fa">Saved as PNG (headless Agg backend)</text>

  <rect x="480" y="830" width="340" height="90" rx="12" fill="#0f2027" stroke="#22c55e" stroke-width="2"/>
  <text x="650" y="858" text-anchor="middle" font-size="13" font-weight="bold" fill="#22c55e">🔍 Inference Engine</text>
  <text x="650" y="876" text-anchor="middle" font-size="10" fill="#94a3b8">Load model at Flask startup</text>
  <text x="650" y="891" text-anchor="middle" font-size="10" fill="#94a3b8">Predict Crime_Category + Confidence</text>
  <text x="650" y="906" text-anchor="middle" font-size="10" fill="#94a3b8">Fallback to keyword rules if conf &lt; 0.60</text>

  <!-- Arrows down -->
  <line x1="250" y1="920" x2="250" y2="955" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="650" y1="920" x2="650" y2="955" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 8: Flask App + Admin Dashboard (side by side) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="80" y="955" width="340" height="90" rx="12" fill="#1b3a57" stroke="#ffd166" stroke-width="2"/>
  <text x="250" y="983" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffd166">🌐 Flask App (Railway)</text>
  <text x="250" y="1001" text-anchor="middle" font-size="10" fill="#94a3b8">/submit_complaint · /analyze</text>
  <text x="250" y="1016" text-anchor="middle" font-size="10" fill="#94a3b8">/register · /login · /track</text>
  <text x="250" y="1031" text-anchor="middle" font-size="10" fill="#60a5fa">Logs predictions → ai_analysis_logs</text>

  <rect x="480" y="955" width="340" height="90" rx="12" fill="#1b3a57" stroke="#a78bfa" stroke-width="2"/>
  <text x="650" y="983" text-anchor="middle" font-size="13" font-weight="bold" fill="#a78bfa">🛡️ Admin Dashboard</text>
  <text x="650" y="1001" text-anchor="middle" font-size="10" fill="#94a3b8">BERT vs Fallback source per log</text>
  <text x="650" y="1016" text-anchor="middle" font-size="10" fill="#94a3b8">Confidence scores · Model metadata</text>
  <text x="650" y="1031" text-anchor="middle" font-size="10" fill="#94a3b8">Training date · Test accuracy</text>

  <!-- Arrows down -->
  <line x1="250" y1="1045" x2="250" y2="1075" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="650" y1="1045" x2="650" y2="1075" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 9: Database -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="80" y="1075" width="340" height="75" rx="12" fill="#0f2027" stroke="#e63946" stroke-width="2"/>
  <text x="250" y="1103" text-anchor="middle" font-size="13" font-weight="bold" fill="#e63946">🗄️ PostgreSQL (Supabase)</text>
  <text x="250" y="1121" text-anchor="middle" font-size="10" fill="#94a3b8">users · complaints · otp_store</text>
  <text x="250" y="1136" text-anchor="middle" font-size="10" fill="#94a3b8">activity_logs · ai_analysis_logs</text>

  <rect x="480" y="1075" width="340" height="75" rx="12" fill="#0f2027" stroke="#60a5fa" stroke-width="2"/>
  <text x="650" y="1103" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa">📈 Visualization Charts</text>
  <text x="650" y="1121" text-anchor="middle" font-size="10" fill="#94a3b8">loss.png · accuracy.png</text>
  <text x="650" y="1136" text-anchor="middle" font-size="10" fill="#94a3b8">confusion_matrix.png · label_dist.png</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Arrow markers -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

</svg>
