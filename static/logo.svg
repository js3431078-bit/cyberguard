<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" width="240" height="56" role="img" aria-label="CyberGuard Portal">
  <defs>
    <linearGradient id="ibg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#1b3a57"/>
    </linearGradient>
    <linearGradient id="ilk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#c1121f"/>
    </linearGradient>
  </defs>

  <!-- App icon tile -->
  <rect x="0" y="4" width="48" height="48" rx="11" ry="11" fill="url(#ibg)"/>

  <!-- Shield on tile -->
  <path d="M24 10 L38 14.5 L38 28 Q38 37 24 42 Q10 37 10 28 L10 14.5 Z"
        fill="rgba(255,255,255,0.13)" stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>

  <!-- Lock body -->
  <rect x="16.5" y="26" width="15" height="11" rx="2.5" fill="url(#ilk)"/>

  <!-- Lock shackle -->
  <path d="M19.5 26 L19.5 21.5 Q19.5 17 24 17 Q28.5 17 28.5 21.5 L28.5 26"
        fill="none" stroke="#ffd166" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M19.5 26 L19.5 21.5 Q19.5 17 24 17 Q28.5 17 28.5 21.5 L28.5 26"
        fill="none" stroke="#1b3a57" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Keyhole -->
  <circle cx="24" cy="30.5" r="2.2" fill="white" opacity="0.95"/>
  <rect x="22.9" y="30.5" width="2.2" height="3.5" rx="1.1" fill="white" opacity="0.95"/>

  <!-- Red accent bar at bottom of tile -->
  <rect x="16" y="47" width="16" height="2" rx="1" fill="#e63946" opacity="0.85"/>

  <!-- Wordmark -->
  <text x="60" y="26"
        font-family="Segoe UI,Helvetica Neue,Arial,sans-serif"
        font-size="18" font-weight="800" fill="#1b3a57" letter-spacing="-0.4">Cyber<tspan fill="#e63946">Guard</tspan></text>

  <!-- Subtitle -->
  <text x="60" y="39"
        font-family="Segoe UI,Helvetica Neue,Arial,sans-serif"
        font-size="7.5" font-weight="600" fill="#64748b" letter-spacing="1.1">CYBERCRIME PORTAL</text>

  <!-- Divider -->
  <line x1="60" y1="43" x2="236" y2="43" stroke="#e2e8f0" stroke-width="0.6"/>

  <!-- Micro tagline -->
  <text x="60" y="52"
        font-family="Segoe UI,Helvetica Neue,Arial,sans-serif"
        font-size="6.5" fill="#94a3b8" letter-spacing="0.2">AI-Powered  ·  Secure  ·  Cross-Platform</text>
</svg>
