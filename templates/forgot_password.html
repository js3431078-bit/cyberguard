<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password - Student Cybercrime Portal</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1b3a57">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CyberGuard">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo-icon.svg') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark">

<div class="auth-container">
<div class="auth-box">

  <div class="auth-logo">
    <img src="{{ url_for('static', filename='logo.svg') }}" alt="CyberGuard" style="height:48px;width:auto;margin-bottom:4px;">
  </div>
  <h1>Reset Your Password</h1>
  <p>Enter your registered email and choose a new password</p>

  <div id="statusMsg" class="status-msg" style="min-height:18px;"></div>

  <form id="resetForm" onsubmit="doReset(event)">
    <input type="email" id="email" placeholder="Registered Email Address" required>
    <input type="password" id="new_password" placeholder="New Password (min 6 chars)" required>
    <input type="password" id="confirm_password" placeholder="Confirm New Password" required>
    <div class="show-password">
      <input type="checkbox" onclick="togglePass()"> Show Passwords
    </div>
    <button type="submit" id="resetBtn">Reset Password →</button>
  </form>

  <div class="auth-links">
    <a href="/login">← Back to Login</a>
  </div>

</div>
</div>

<script>
function togglePass() {
  ["new_password","confirm_password"].forEach(function(id){
    var el = document.getElementById(id);
    el.type = el.type === "password" ? "text" : "password";
  });
}
function doReset(e) {
  e.preventDefault();
  var email   = document.getElementById("email").value.trim();
  var newPass = document.getElementById("new_password").value;
  var confirm = document.getElementById("confirm_password").value;
  var st = document.getElementById("statusMsg");
  if (newPass.length < 6) { st.textContent = "Password must be at least 6 characters."; st.style.color="#e63946"; return; }
  if (newPass !== confirm) { st.textContent = "Passwords do not match."; st.style.color="#e63946"; return; }
  var btn = document.getElementById("resetBtn");
  btn.textContent = "Resetting...";
  btn.disabled = true;
  fetch("/reset-password", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email:email, new_password:newPass})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if (d.success) {
      st.textContent = "✅ " + d.message;
      st.style.color = "#16a34a";
      setTimeout(function(){ window.location.href="/login"; }, 2000);
    } else {
      st.textContent = "❌ " + (d.message || "Reset failed.");
      st.style.color = "#e63946";
      btn.textContent = "Reset Password →";
      btn.disabled = false;
    }
  })
  .catch(function(){
    st.textContent = "❌ Server error. Try again.";
    st.style.color = "#e63946";
    btn.textContent = "Reset Password →";
    btn.disabled = false;
  });
}
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
</html>
