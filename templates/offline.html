<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Offline - CyberGuard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0f2027,#1b3a57);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;text-align:center;padding:24px;}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:48px 36px;max-width:400px;width:100%;}
.icon{font-size:64px;margin-bottom:20px;}
h1{font-size:24px;font-weight:800;margin-bottom:10px;}
p{font-size:14px;color:#94a3b8;line-height:1.7;margin-bottom:24px;}
.btn{display:inline-block;padding:12px 28px;background:#e63946;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:background .2s;}
.btn:hover{background:#c1121f;}
.helpline{margin-top:20px;font-size:13px;color:#ffd166;font-weight:600;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection detected. Please check your network and try again.<br><br>
  For urgent cybercrime help, call the helpline directly.</p>
  <a href="/home" class="btn" onclick="location.reload()">🔄 Try Again</a>
  <div class="helpline">📞 Cyber Crime Helpline: 1930</div>
</div>
</body>
</html>
