<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register - AI Cybercrime Portal</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1b3a57">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CyberGuard">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo-icon.svg') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body.dark{
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;align-items:center;justify-content:center;
  font-family:'Segoe UI',Arial,sans-serif;
  padding:20px 14px;
}
.reg-wrap{
  background:#fff;border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  width:100%;max-width:500px;
  padding:38px 36px;
}
.reg-head{text-align:center;margin-bottom:22px;}
.reg-head .badge{
  display:inline-flex;align-items:center;gap:6px;
  background:#fff5f5;border:1px solid #fecaca;
  color:#e63946;font-size:11px;font-weight:700;
  padding:4px 12px;border-radius:20px;margin-bottom:10px;
  text-transform:uppercase;letter-spacing:.5px;
}
.reg-head h1{font-size:22px;color:#1b3a57;font-weight:700;margin-bottom:4px;}
.reg-head p{font-size:13px;color:#94a3b8;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.f{margin-bottom:12px;}
.f input{
  width:100%;padding:11px 14px;
  border:1.5px solid #e2e8f0;border-radius:8px;
  font-size:14px;background:#f8fafc;
  transition:border .2s,box-shadow .2s;
}
.f input:focus{border-color:#1b3a57;box-shadow:0 0 0 3px rgba(27,58,87,.08);outline:none;background:#fff;}
.f input.ok {border-color:#22c55e;background:#f0fdf4;}
.f input.bad{border-color:#ef4444;background:#fff5f5;}
.ferr{font-size:11px;color:#ef4444;margin-top:3px;display:none;}
.ferr.on{display:block;}
.sbar-bg{height:3px;background:#e2e8f0;border-radius:3px;margin-top:5px;overflow:hidden;}
.sbar{height:100%;width:0;border-radius:3px;transition:width .3s,background .3s;}
.slbl{font-size:10.5px;font-weight:600;margin-top:2px;}
.show-row{display:flex;align-items:center;gap:8px;font-size:13px;color:#64748b;margin:10px 0;cursor:pointer;}
.show-row input[type="checkbox"]{width:15px;height:15px;flex-shrink:0;accent-color:#1b3a57;cursor:pointer;margin:0;}
.terms-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#64748b;margin:8px 0 4px;}
.terms-row input{width:15px;height:15px;margin-top:2px;accent-color:#1b3a57;flex-shrink:0;cursor:pointer;}
.terms-row a{color:#1b3a57;font-weight:600;}
.btn-reg{
  width:100%;padding:13px;
  background:#e63946;color:#fff;
  border:none;border-radius:8px;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:background .2s,transform .1s;
  margin-top:10px;
}
.btn-reg:hover{background:#c1121f;}
.btn-reg:active{transform:scale(.98);}
.btn-reg:disabled{background:#ccc;cursor:not-allowed;}
.bottom-link{text-align:center;margin-top:16px;font-size:13px;color:#94a3b8;}
.bottom-link a{color:#1b3a57;font-weight:600;text-decoration:none;}
.bottom-link a:hover{text-decoration:underline;}
@media(max-width:480px){
  .reg-wrap{padding:26px 18px;}
  .row2{grid-template-columns:1fr;}
}
</style>
</head>
<body class="dark">
<div class="reg-wrap">

  <div class="reg-head">
    <img src="{{ url_for('static', filename='logo.svg') }}" alt="CyberGuard" style="height:44px;width:auto;margin-bottom:10px;">
    <h1>Create Your Account</h1>
    <p>Register to report and track cyber crimes</p>
  </div>

  <form id="regForm" onsubmit="doRegister(event)" novalidate>

    <div class="row2">
      <div class="f">
        <input type="text" id="name" placeholder="Full Name" oninput="vName()">
        <div class="ferr" id="nameErr">Enter your full name.</div>
      </div>
      <div class="f">
        <input type="tel" id="phone" placeholder="Phone (10 digits)"
          oninput="this.value=this.value.replace(/[^0-9]/g,'');vPhone();" maxlength="10">
        <div class="ferr" id="phoneErr">10 digits required.</div>
      </div>
    </div>

    <div class="f">
      <input type="email" id="email" placeholder="Email Address" oninput="vEmail()">
      <div class="ferr" id="emailErr">Enter a valid email.</div>
    </div>

    <div class="row2">
      <div class="f">
        <input type="password" id="password" placeholder="Password" oninput="vPass()">
        <div class="sbar-bg"><div class="sbar" id="sbar"></div></div>
        <div class="slbl" id="slbl"></div>
        <div class="ferr" id="passErr">Min 8 chars, A-Z, 0-9, symbol.</div>
      </div>
      <div class="f">
        <input type="password" id="cpass" placeholder="Confirm Password" oninput="vCpass()">
        <div class="ferr" id="cpassErr">Passwords don't match.</div>
      </div>
    </div>

    <label class="show-row">
      <input type="checkbox" onchange="togglePass(this)"> Show Passwords
    </label>

    <div class="terms-row">
      <input type="checkbox" id="terms">
      <label for="terms">I agree to the <a href="#">Terms &amp; Conditions</a></label>
    </div>
    <div class="ferr" id="termsErr">Please accept the terms.</div>

    <!-- CAPTCHA -->
    <div class="f" style="margin-top:4px;">
      <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:9px;padding:12px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <span style="font-size:13px;color:#475569;font-weight:600;">Security Check:</span>
        <span id="captchaQ" style="font-size:16px;font-weight:800;color:#1b3a57;font-family:monospace;background:#e2e8f0;padding:4px 12px;border-radius:6px;letter-spacing:2px;"></span>
        <span style="font-size:13px;color:#64748b;">=</span>
        <input type="text" id="captchaAns" placeholder="Answer" maxlength="4"
          style="width:80px;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:14px;font-weight:700;text-align:center;outline:none;">
        <button type="button" onclick="genCaptcha()" style="background:none;border:none;cursor:pointer;font-size:18px;" title="Refresh">🔄</button>
      </div>
      <div class="ferr" id="captchaErr">Incorrect answer. Please try again.</div>
    </div>

    <button type="submit" class="btn-reg" id="regBtn">✅ Create Account</button>

  </form>

  <div class="bottom-link">Already have an account? <a href="/login">Login here</a></div>
</div>

<script>
function vName()  { return sf("name",  document.getElementById("name").value.trim().length >= 2, "nameErr"); }
function vEmail() { return sf("email", /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(document.getElementById("email").value.trim()), "emailErr"); }
function vPhone() { return sf("phone", document.getElementById("phone").value.trim().length === 10, "phoneErr"); }
function vPass()  {
  var v = document.getElementById("password").value;
  var ok = v.length >= 8 && /[A-Z]/.test(v) && /[0-9]/.test(v) && /[!@#$%^&*]/.test(v);
  sf("password", ok, "passErr"); strength(v); vCpass(); return ok;
}
function vCpass() {
  return sf("cpass",
    document.getElementById("cpass").value !== "" &&
    document.getElementById("password").value === document.getElementById("cpass").value,
    "cpassErr");
}
function sf(id, ok, eid) {
  document.getElementById(id).className = ok ? "ok" : "bad";
  document.getElementById(eid).className = ok ? "ferr" : "ferr on";
  return ok;
}
function strength(v) {
  var s=0;
  if(v.length>=8)s++; if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[!@#$%^&*]/.test(v))s++;
  var m=[{w:"20%",c:"#ef4444",t:"Weak"},{w:"45%",c:"#f97316",t:"Fair"},{w:"72%",c:"#0d9488",t:"Good"},{w:"100%",c:"#22c55e",t:"Strong"}];
  var l = v.length ? (m[s-1]||m[0]) : null;
  document.getElementById("sbar").style.cssText = l ? "width:"+l.w+";background:"+l.c : "width:0";
  document.getElementById("slbl").textContent = l ? l.t : "";
  document.getElementById("slbl").style.color = l ? l.c : "";
}
// ── CAPTCHA ──
var captchaAnswer = 0;
function genCaptcha() {
  var a = Math.floor(Math.random()*9)+1;
  var b = Math.floor(Math.random()*9)+1;
  var ops = [
    {q: a + " + " + b, ans: a+b},
    {q: (a+b) + " - " + a, ans: b},
    {q: a + " × " + b, ans: a*b}
  ];
  var pick = ops[Math.floor(Math.random()*ops.length)];
  document.getElementById("captchaQ").textContent = pick.q;
  captchaAnswer = pick.ans;
  document.getElementById("captchaAns").value = "";
  document.getElementById("captchaErr").className = "ferr";
}
genCaptcha();

function vCaptcha() {
  var ans = parseInt(document.getElementById("captchaAns").value.trim());
  var ok = ans === captchaAnswer;
  document.getElementById("captchaErr").className = ok ? "ferr" : "ferr on";
  return ok;
}

function doRegister(e) {
  e.preventDefault();
  var n=vName(), em=vEmail(), ph=vPhone(), pw=vPass(), cp=vCpass();
  var terms = document.getElementById("terms").checked;
  if (!terms) { document.getElementById("termsErr").className="ferr on"; return; }
  document.getElementById("termsErr").className="ferr";
  if (!n||!em||!ph||!pw||!cp) return;
  if (!vCaptcha()) { document.getElementById("captchaErr").className="ferr on"; return; }

  var btn = document.getElementById("regBtn");
  btn.textContent = "Creating account...";
  btn.disabled = true;

  fetch("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value.trim(),
      email: document.getElementById("email").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      password: document.getElementById("password").value
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if (d.status === "success") {
      btn.innerHTML = "✅ Account Created!";
      btn.style.background = "#22c55e";
      setTimeout(function(){ window.location.href="/login"; }, 1200);
    } else if (d.status === "duplicate") {
      btn.innerHTML = "⚠️ Already Registered";
      btn.style.background = "#f97316";
      btn.disabled = false;
      var st = document.createElement("div");
      st.style.cssText = "margin-top:12px;padding:12px 16px;background:#fff7ed;border:1px solid #fed7aa;border-radius:9px;color:#c2410c;font-size:13px;font-weight:600;text-align:center;";
      st.textContent = d.message;
      document.getElementById("regForm").appendChild(st);
      setTimeout(function(){ window.location.href="/login"; }, 2500);
    } else {
      alert(d.message);
      btn.textContent = "✅ Create Account";
      btn.disabled = false;
    }
  })
  .catch(function(){
    alert("Server error. Try again.");
    btn.textContent = "✅ Create Account";
    btn.disabled = false;
  });
}
function togglePass(cb) {
  ["password","cpass"].forEach(function(id){
    document.getElementById(id).type = cb.checked ? "text" : "password";
  });
}
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
</html>
